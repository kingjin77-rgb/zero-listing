    const { useState } = React;



// ═══════════════════════════════════════════════════════════════
//  다산자연앤이편한세상3차 분양전환 시세예측 시스템
//  헤도닉 가격모델 (Hedonic Pricing Model)
//
//  예측가 = Σ(비교단지 가중평균 ㎡당가) × 면적
//           × ∏(1 + 각 보정계수)
//
//  데이터 기준: 2025년 5월 (아파트랭킹·호갱노노 검색)
// ═══════════════════════════════════════════════════════════════

// ── 대상 단지 (공고문 확정) ─────────────────────────────────
const TARGET = {
  name: "다산자연앤이편한세상 3차",
  brand: "GH", year: 2019, stationDist: 650,
  units: [
    { type:"51A", area:51.96, rooms:2, group:51, count:350, desc:"51.956㎡ · 방2개" },
    { type:"51B", area:52.00, rooms:3, group:51, count:250, desc:"51.999㎡ · 방3개" },
    { type:"59A", area:59.96, rooms:3, group:59, count:450, desc:"59.962㎡ · 방3개" },
    { type:"59B", area:59.99, rooms:3, group:59, count:200, desc:"59.993㎡ · 방3개" },
    { type:"59C", area:59.81, rooms:3, group:59, count:144, desc:"59.806㎡ · 방3개" },
  ],
};

// ── 비교 단지 시세 (검색 기반, 2025.05 기준) ─────────────────
// 출처: 아파트랭킹 실거래, 호갱노노 평당가
// 59㎡ = 공급 24평형 기준 / 51㎡ = 공급 21평형 기준(해당단지 없으면 면적비례 추정)
const COMPS = [
  {
    name:"다산이편한세상자이", year:2018, brand:"자이",
    stationDist:402, stationLine:"8호선 다산역",
    psm59: Math.round(86000/59.99),    // 실거래 최고 8.6억 / 59.99㎡
    psm51: null,                        // 해당 타입 없음 → 면적비례 자동추정
    jeonse59:54000, source:"아파트랭킹 20평대 최고가", weight:1.0,
  },
  {
    name:"힐스테이트다산", year:2019, brand:"힐스테이트",
    stationDist:580, stationLine:"8호선 다산역",
    psm59: Math.round(80000/59.86),    // 평당 3,333만 × 24평 ≈ 8억 / 59.86㎡
    psm51: null,
    jeonse59:47000, source:"호갱노노 평당가 3,333만", weight:0.9,
  },
  {
    name:"다산롯데캐슬", year:2020, brand:"롯데캐슬",
    stationDist:680, stationLine:"8호선 다산역",
    psm59: Math.round(76000/59.88),    // 다산역 인근, 역세권 유사, 2020년 준공 보정
    psm51: null,
    jeonse59:45000, source:"호갱노노 평당가 기준 추정", weight:0.85,
  },
  {
    name:"다산신도시자연앤자이", year:2019, brand:"자이",
    stationDist:920, stationLine:"8호선 다산역",
    psm59: Math.round(73000/59.71),    // 역세권 거리 있음, 동일 자이 브랜드
    psm51: null,
    jeonse59:43000, source:"호갱노노 평당가 기준 추정", weight:0.8,
  },
  {
    name:"다산반도유보라메이플타운", year:2020, brand:"기타",
    stationDist:1050, stationLine:"8호선 다산역",
    psm59: Math.round(66000/59.63),    // 비역세권, 브랜드 낮음
    psm51: null,
    jeonse59:40000, source:"시세 추정", weight:0.65,
  },
];

// ── 헤도닉 보정 계수 (근거 문헌 병기) ──────────────────────
const HEDONIC = {
  // ① 브랜드: KB 브랜드 프리미엄 지수
  brand: { GH:-0.03, 자이:0, 힐스테이트:0, 롯데캐슬:-0.02, 기타:-0.04 },
  // ② 역세권: 국토연구원 「대중교통 접근성과 주택가격」(2022)
  station: d => d<300?+.12 : d<500?+.08 : d<800?+.04 : d<1200?0 : -.03,
  // ③ 방 수: 동일면적 2룸 vs 3룸 실거래 비교 (약 -4%)
  rooms: r => r===2 ? -.04 : 0,
  // ④ 학군: 한국감정원 「학군이 주택가격에 미치는 영향」(2021)
  school: { 우수:+.08, 양호:+.03, 보통:0, 미흡:-.03 },
  // ⑤ 자연환경: 국토연구원 「공원·녹지와 주택가격」(2020)
  env: { "공원·산 인접":+.04, 표준:0, "대로변·소음":-.03 },
  // ⑥ 분양전환 단계
  conv: { 직후:-.03, 완료:0 },
  // ⑦ 연식: 건물 감가 (연 0.4%)
  age: y => Math.max(-.04, (y-2019)*0.004),
};

// 다산3차 고정 환경 특성
const PROFILE = { school:"양호", env:"공원·산 인접" };

// ── 예측 엔진 ────────────────────────────────────────────────
function predict(unit, convStage) {
  // Step1: 비교단지 ㎡당 단가 수집 (51 없으면 59에서 면적비례 추정)
  const entries = COMPS.map(c => {
    let psm = unit.group===59 ? c.psm59 : c.psm51;
    let derived = false;
    if (!psm && c.psm59) {
      // 59㎡ → 51㎡: 면적비례 (동일 ㎡당 단가 사용, 2룸/3룸 보정은 아래 별도 적용)
      psm = c.psm59;
      derived = true;
    }
    return { ...c, psm, derived };
  }).filter(c => c.psm > 0);

  if (!entries.length) return null;

  // Step2: 가중평균 ㎡당 단가 (역세권·연식·사용자 가중치 복합)
  let sumW=0, sumWP=0;
  entries.forEach(c => {
    const dW = c.stationDist<400?1.0 : c.stationDist<700?.9 : c.stationDist<1000?.75 : .6;
    const aW = Math.max(.7, 1 - Math.abs(c.year-TARGET.year)*.05);
    const w  = c.weight * dW * aW;
    sumWP += c.psm * w;
    sumW  += w;
  });
  const avgPsm = sumWP / sumW;

  // Step3: 헤도닉 보정 (각 항목 독립 곱셈)
  const corr = {
    brand:  HEDONIC.brand[TARGET.brand]   ?? 0,
    sta:    HEDONIC.station(TARGET.stationDist),
    rooms:  HEDONIC.rooms(unit.rooms),
    school: HEDONIC.school[PROFILE.school] ?? 0,
    env:    HEDONIC.env[PROFILE.env]       ?? 0,
    conv:   HEDONIC.conv[convStage]        ?? 0,
    age:    HEDONIC.age(TARGET.year),
  };
  const mult = Object.values(corr).reduce((acc,v)=>(1+v)*acc, 1);
  // 참고: 곱셈 방식이므로 단순합과 다름 (교차효과 반영)

  const base = avgPsm * unit.area;
  const est  = Math.round(base * mult / 500) * 500;
  const ci   = entries.length>=4?.05 : entries.length>=3?.07 : .10;

  return {
    est, base: Math.round(base),
    low:  Math.round(est*(1-ci)/500)*500,
    high: Math.round(est*(1+ci)/500)*500,
    avgPsm: Math.round(avgPsm),
    mult: Math.round((mult-1)*1000)/10,
    corr: Object.fromEntries(Object.entries(corr).map(([k,v])=>[k, Math.round(v*1000)/10])),
    n: entries.length,
    hasDerived: entries.some(e=>e.derived),
  };
}

// ── UI 헬퍼 ─────────────────────────────────────────────────
const C = {
  primary:"#0A2540", accent:"#1B6EF3", accentL:"#E8F0FE",
  ok:"#00C48C", warn:"#F59E0B", danger:"#EF4444",
  bg:"#F5F7FA", card:"#fff", border:"#E2E8F0", text:"#1A202C", muted:"#718096",
};
const fmt = v => !v||v<=0?"—" : v>=10000?(v/10000).toFixed(2)+"억" : v.toLocaleString()+"만";
const pct = v => (v>0?"+":"")+v+"%";

// ── 타입 선택 버튼 ────────────────────────────────────────────
function TypeBtn({u, sel, onClick}) {
  const on = sel.type===u.type;
  return (
    <button onClick={onClick} style={{
      padding:"9px 16px", borderRadius:8, border:"none", cursor:"pointer",
      background: on?C.accent:C.card, color: on?"#fff":C.muted,
      fontWeight: on?700:400, fontSize:12,
      boxShadow: on?"0 3px 10px rgba(27,110,243,.3)":null,
      transition:"all .15s",
    }}>
      <div style={{fontWeight:700}}>{u.type}</div>
      <div style={{fontSize:10, marginTop:1}}>{u.area}㎡ · 방{u.rooms}개</div>
    </button>
  );
}

  const [conv, setConv]       = useState("직후");
  const [tab, setTab]         = useState("result");
  const [showEdit, setShowEdit] = useState(false);
  const [comps, setComps]     = useState(COMPS);
  const [aiTxt, setAiTxt]     = useState("");
  const [aiLoad, setAiLoad]   = useState(false);

  const pred = predict(selUnit, conv);

  // AI 심층분석
  async function runAI() {
    if (!pred) return;
    setAiLoad(true); setAiTxt("");
    const compLine = comps.filter(c=>c.psm59>0)
      .map(c=>`${c.name}(역${c.stationDist}m, ${c.year}) 59㎡ ㎡당${c.psm59}만`).join(" | ");
    const corrLine = Object.entries(pred.corr).map(([k,v])=>`${k}:${pct(v)}`).join(" ");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:
`남양주 다산신도시 분양전환 전문 부동산 분석가로서 분석하세요.

[분석 대상]
다산자연앤이편한세상3차 (GH 공공임대) · 2019 · 다산역 650m · 분양전환 ${conv}
${selUnit.type}타입 · ${selUnit.area}㎡ · 방${selUnit.rooms}개 · ${selUnit.count}세대
기금융자 5,500만원 (연2.8%, 20년)

[비교단지 시세 (2025.05)]
${compLine}

[헤도닉 모델 보정]
${corrLine}
총 보정: ${pct(pred.mult)}

[예측 결과]
기준가(보정전): ${fmt(pred.base)}
예측 매매가: ${fmt(pred.low)} ~ ${fmt(pred.high)}
중앙 예측가: ${fmt(pred.est)}

분석 요청:
1. 예측가 신뢰도 및 보정 타당성
2. 51A(방2) vs 51B(방3) 수요·가격 차이 전망
3. 분양전환 직후 vs 완료 후 시세 흐름 예상
4. 현 시점 매도 vs 보유 전략 (분양전환가 기준)
5. 제로공실 중개사 관점의 핵심 세일즈 포인트

전문 보고서 형식, 핵심 인사이트 중심으로 간결하게.`
        }]})
      });
      const d = await res.json();
      setAiTxt(d.content?.map(b=>b.text||"").join("")||"오류");
    } catch { setAiTxt("API 오류"); }
    setAiLoad(false);
  }

  return (
    <div style={{fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",background:C.bg,minHeight:"100vh",color:C.text}}>

      {/* HEADER */}
      <div style={{background:C.primary,color:"#fff",padding:"18px 24px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <div style={{background:C.accent,borderRadius:5,padding:"3px 9px",fontSize:10,fontWeight:700,letterSpacing:.8}}>ZERO VACANCY</div>
          <span style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>분양전환 시세예측 · 케이탑공인중개사사무소</span>
        </div>
        <h1 style={{margin:"4px 0 2px",fontSize:18,fontWeight:800}}>다산자연앤이편한세상 3차</h1>
        <p style={{margin:"0 0 10px",fontSize:11,color:"rgba(255,255,255,.5)"}}>
          GH 공공임대 · 2019 · 1,394세대 · 8호선 다산역 約650m
        </p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
          {["헤도닉 가격모델","역세권 보정","학군 보정","자연환경 보정","방 수 보정","분양전환 단계"].map(t=>(
            <span key={t} style={{background:"rgba(255,255,255,.08)",borderRadius:5,padding:"2px 7px",fontSize:10,color:"rgba(255,255,255,.5)"}}>{t}</span>
          ))}
        </div>
        <div style={{display:"flex",marginTop:4}}>
          {[["result","예측 결과"],["detail","보정 내역"],["comp","비교단지"],["logic","예측 로직"],["ai","AI 분석"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",color:tab===k?"#fff":"rgba(255,255,255,.4)",padding:"9px 14px",fontSize:12,fontWeight:tab===k?700:400,cursor:"pointer"}}>{l}</button>

        </div>
      </div>

      <div style={{padding:"18px 24px",maxWidth:960,margin:"0 auto"}}>

        {/* ══ 예측 결과 ══ */}
        {tab==="result" && (
          <div>
            {/* 컨트롤 */}
            <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:6}}>타입 선택</div>

                      {s==="직후"?"전환 직후":"전환 완료"}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {pred && (
              <div>
                {/* 메인 예측 카드 */}
                <div style={{display:"grid",gridTemplateColumns:"1.3fr 1fr",gap:14,marginBottom:14}}>
                  <div style={{background:C.card,borderRadius:14,border:`2px solid ${C.accent}`,padding:24}}>
                    <div style={{fontSize:11,color:C.muted}}>
                      {selUnit.type} · {selUnit.area}㎡ · 방{selUnit.rooms}개 · {selUnit.count}세대 · 분양전환 {conv}
                    </div>
                    <div style={{fontSize:11,color:C.accent,fontWeight:600,margin:"10px 0 4px"}}>예측 매매가 범위</div>
                    <div style={{fontSize:32,fontWeight:900,color:C.primary,letterSpacing:-1,lineHeight:1.1}}>
                      {fmt(pred.low)}
                      <span style={{fontSize:20,color:C.muted,margin:"0 8px"}}>~</span>
                      {fmt(pred.high)}
                    </div>
                    <div style={{marginTop:14,padding:14,background:C.accentL,borderRadius:10}}>
                      <div style={{fontSize:11,color:C.accent,fontWeight:600}}>중앙 예측가</div>
                      <div style={{fontSize:28,fontWeight:800,color:C.accent,lineHeight:1.2}}>{fmt(pred.est)}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                        비교단지 ㎡당 {pred.avgPsm.toLocaleString()}만 · 총 보정 {pct(pred.mult)}
                      </div>
                    </div>
                    {pred.hasDerived && (
                      <div style={{marginTop:8,padding:"6px 10px",background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:6,fontSize:11,color:"#92400E"}}>
                        ⚠️ 51㎡ 직접 거래 데이터 부족 → 59㎡ ㎡당 단가에서 면적 비례 추정

                    <div style={{marginTop:10,fontSize:11,color:C.muted}}>
                      기준: 2025.05 · 비교단지 {pred.n}곳 · 신뢰구간 ±{pred.n>=4?5:pred.n>=3?7:10}%

                  {/* 보정 요약 */}
                  <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:20}}>

                      ["⑦ 연식",    pred.corr.age,    "2019년 기준"],
                    ].map(([l,v,n])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                        <div>
                          <div style={{fontSize:12}}>{l}</div>
                          <div style={{fontSize:10,color:C.muted}}>{n}</div>
                        </div>
                        <span style={{fontWeight:700,fontSize:13,color:v>0?C.ok:v<0?C.danger:C.muted}}>{pct(v)}</span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0",fontWeight:800}}>
                      <span>총 보정 (곱셈)</span>
                      <span style={{color:pred.mult>=0?C.ok:C.danger,fontSize:15}}>{pct(pred.mult)}</span>
                    </div>
                  </div>
                </div>

                {/* 전체 타입 비교 */}
                <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
                  <div style={{padding:"11px 16px",background:"#F8FAFC",fontWeight:700,fontSize:13,borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>전체 타입 예측 (분양전환 {conv})</span>
                    <span style={{fontSize:11,color:C.muted,fontWeight:400}}>기준: 2025.05</span>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:C.primary,color:"#fff"}}>
                        {["타입","면적","방수","세대","예측 하한","중앙 예측가","예측 상한","㎡당 단가"].map(h=>(
                          <th key={h} style={{padding:"9px 10px",fontSize:11,textAlign:"center"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {TARGET.units.map((u,i)=>{
                        const p = predict(u, conv);
                        const on = u.type===selUnit.type;
                        return (
                          <tr key={u.type} onClick={()=>setSelUnit(u)}
                            style={{background:on?C.accentL:i%2===0?"#fff":"#F8FAFC",cursor:"pointer",borderBottom:`1px solid ${C.border}`}}>
                            <td style={{padding:"10px"}}>
                              <div style={{fontWeight:700,color:on?C.accent:C.text}}>{u.type}</div>
                              <div style={{fontSize:10,color:C.muted}}>방{u.rooms}개</div>
                            </td>
                            <td style={{padding:"10px",textAlign:"center",color:C.muted}}>{u.area}</td>
                            <td style={{padding:"10px",textAlign:"center"}}>
                              <span style={{background:u.rooms===2?"#FEE2E2":"#DCFCE7",color:u.rooms===2?C.danger:"#166534",borderRadius:5,padding:"2px 7px",fontSize:11,fontWeight:600}}>
                                {u.rooms}룸
                              </span>
                            </td>
                            <td style={{padding:"10px",textAlign:"center",color:C.muted}}>{u.count}</td>
                            <td style={{padding:"10px",textAlign:"center",color:C.ok,fontWeight:600}}>{p?fmt(p.low):"—"}</td>
                            <td style={{padding:"10px",textAlign:"center",fontWeight:800,color:C.accent,fontSize:14}}>{p?fmt(p.est):"—"}</td>
                            <td style={{padding:"10px",textAlign:"center",color:C.danger,fontWeight:600}}>{p?fmt(p.high):"—"}</td>
                            <td style={{padding:"10px",textAlign:"center",color:C.warn,fontWeight:600}}>{p?p.avgPsm.toLocaleString()+"만":"—"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <button onClick={runAI} disabled={aiLoad} style={{width:"100%",padding:13,borderRadius:10,border:"none",background:aiLoad?"#94A3B8":`linear-gradient(135deg,${C.accent},#4F8EF7)`,color:"#fff",fontWeight:700,fontSize:14,cursor:aiLoad?"not-allowed":"pointer"}}>
                  {aiLoad?"🤖 분석 중...":"🤖 AI 심층 분석 실행"}
                </button>
              </div>
            )}
          </div>
        )}

        {/* ══ 보정 내역 ══ */}
        {tab==="detail" && (
          <div style={{display:"grid",gap:10}}>
            {[
              {icon:"①",title:"브랜드 보정",val:pred?.corr.brand,basis:"KB 브랜드 프리미엄 지수",detail:"GH(경기주택도시공사) 공공브랜드는 자이·힐스테이트 등 1군 민간 브랜드 대비 평균 3% 낮게 거래됨. 브랜드 인지도 및 선호도 차이 반영."},
              {icon:"②",title:"역세권 보정",val:pred?.corr.sta,basis:"국토연구원 (2022)",detail:`8호선 다산역까지 약 ${TARGET.stationDist}m. 400~800m 구간 적용 +4%. 100m 가까울수록 약 0.5~1.0% 상승 효과(국토연구원 연구 기반).`},
              {icon:"③",title:"방 수 보정",val:pred?.corr.rooms,basis:"동일 면적 실거래 비교 분석",detail:"51A(2룸)는 1인가구·신혼 수요층만 타겟. 같은 면적 3룸 대비 수요층이 좁아 약 4% 낮게 거래. 51B(3룸)은 보정 없음."},
              {icon:"④",title:"학군 보정",val:pred?.corr.school,basis:"한국감정원 (2021)",detail:"다산가람초·남양주다산중 배정. 신도시 내 신설 학교로 '양호' 등급 적용 +3%. 우수 학군(특목중·고 배정) 대비 낮지만 구도심 대비 양호."},
              {icon:"⑤",title:"자연환경 보정",val:pred?.corr.env,basis:"국토연구원 (2020)",detail:"황금산 인근, 자연앤 브랜드 콘셉트. 공원·산 인접 단지는 비인접 대비 평균 3~5% 프리미엄. +4% 적용."},
              {icon:"⑥",title:"분양전환 단계",val:pred?.corr.conv,basis:"공공임대 분양전환 사례 분석",detail:"분양전환 직후: 등기 지연·매물 불확실성으로 -3%. 전환 완료 후: 자유거래 가능, 일반 시세에 수렴."},
              {icon:"⑦",title:"연식 보정",val:pred?.corr.age,basis:"건물 감가상각 기준",detail:"2019년 준공 기준. 주요 비교단지(2018~2020)와 유사 연식으로 보정폭 미미(연 0.4% 감가, 최대 -4% 상한)."},
            ].map(({icon,title,val,basis,detail})=>(
              <div key={title} style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:14}}>{icon} {title}</div>
                  <span style={{fontWeight:800,fontSize:16,color:val>0?C.ok:val<0?C.danger:C.muted}}>{val!==undefined?pct(val):"—"}</span>
                </div>
                <div style={{fontSize:11,color:C.accent,marginBottom:6}}>📚 근거: {basis}</div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>{detail}</div>
              </div>
            ))}
          </div>
        )}

        {/* ══ 비교 단지 ══ */}
        {tab==="comp" && (
          <div>
            <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,padding:12,marginBottom:14,fontSize:12,color:"#1E40AF"}}>
              📊 2025년 5월 기준 · 아파트랭킹·호갱노노 검색 기반 · 관리자가 직접 업데이트 가능
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,background:C.card,borderRadius:12,overflow:"hidden"}}>
                <thead>
                  <tr style={{background:C.primary,color:"#fff"}}>
                    {["단지명","준공","역거리","59㎡ ㎡당가","59㎡ 매매(추정)","전세","가중치","출처"].map(h=>(
                      <th key={h} style={{padding:"10px 10px",fontSize:11,textAlign:"center"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {COMPS.map((c,i)=>(
                    <tr key={c.name} style={{background:i%2===0?"#fff":"#F8FAFC",borderBottom:`1px solid ${C.border}`}}>
                      <td style={{padding:"10px",fontWeight:600}}>
                        <div>{c.name}</div>
                        <div style={{fontSize:10,color:C.accent}}>{c.stationLine} {c.stationDist}m</div>
                      </td>
                      <td style={{padding:"10px",textAlign:"center",color:C.muted}}>{c.year}</td>
                      <td style={{padding:"10px",textAlign:"center"}}>{c.stationDist}m</td>
                      <td style={{padding:"10px",textAlign:"center",fontWeight:700,color:C.warn}}>{c.psm59.toLocaleString()}만</td>
                      <td style={{padding:"10px",textAlign:"center",fontWeight:700,color:C.accent}}>{fmt(c.psm59*60)}</td>
                      <td style={{padding:"10px",textAlign:"center",color:C.muted}}>{fmt(c.jeonse59)}</td>
                      <td style={{padding:"10px",textAlign:"center"}}>{c.weight}</td>
                      <td style={{padding:"10px",textAlign:"center",fontSize:11,color:C.muted}}>{c.source}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:14,background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:10,padding:14,fontSize:12,color:"#92400E"}}>
              ⚠️ 51㎡ 독립 시세: 해당 면적 거래 단지 없음 → 59㎡ ㎡당 단가 × 51.96㎡ 면적비례 추정 적용
            </div>
          </div>
        )}

        {/* ══ 예측 로직 ══ */}
        {tab==="logic" && (
          <div style={{display:"grid",gap:12}}>
            <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📐 헤도닉 가격모델 공식</div>
              <div style={{background:"#F8FAFC",borderRadius:8,padding:14,fontFamily:"monospace",fontSize:13,lineHeight:2.2}}>
                <div><b style={{color:C.accent}}>예측가</b> =</div>
                <div style={{paddingLeft:20}}><b>Σ(비교단지 ㎡당가 × 거리가중 × 연식가중)</b></div>
                <div style={{paddingLeft:20}}>/ Σ(가중치 합계)</div>
                <div style={{paddingLeft:20}}>× <b>대상 면적(㎡)</b></div>
                <div style={{paddingLeft:20}}>× (1+브랜드) × (1+역세권) × (1+방수)</div>
                <div style={{paddingLeft:20}}>× (1+학군) × (1+자연환경)</div>
                <div style={{paddingLeft:20}}>× (1+분양전환) × (1+연식)</div>
              </div>
              <div style={{marginTop:10,fontSize:12,color:C.muted}}>
                * 각 보정계수 곱셈 적용 (가산이 아닌 곱셈: 교차효과 반영, 헤도닉 회귀 표준)
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                {title:"비교단지 가중치 산정", items:["사용자 설정값 (0.5~1.0)","× 역세권 거리 가중 (400m미만:1.0 / ~700m:0.9 / ~1km:0.75 / 이상:0.6)","× 연식 유사도 가중 (5년 차이마다 -5%, 최저 0.7)"]},
                {title:"51㎡ 데이터 처리", items:["1차: 51㎡ 직접 거래가 사용 (있을 때)","2차: 59㎡ ㎡당 단가 그대로 사용 (면적비례)","방 수 차이(2룸↔3룸)는 보정계수 ③에서 별도 처리","데이터 수 < 3개 시 신뢰구간 ±10% 확대"]},
                {title:"신뢰구간 (±%)", items:["비교단지 4곳 이상: ±5%","비교단지 3곳: ±7%","비교단지 1~2곳: ±10%","* 추후 국토부 API 연동 시 실거래 건수 기반 정밀화"]},
                {title:"향후 개선 계획", items:["국토부 실거래 API 백엔드 연동 (자동 업데이트)","층수·향 개별 보정 추가","분기별 시세 자동 갱신","기존 매물접수 플랫폼 통합 연동"]},
              ].map(({title,items})=>(
                <div key={title} style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:16}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:C.primary}}>{title}</div>
                  {items.map(t=><div key={t} style={{fontSize:12,color:C.text,padding:"3px 0",display:"flex",gap:6}}><span style={{color:C.accent}}>▸</span><span>{t}</span></div>)}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══ AI 분석 ══ */}
        {tab==="ai" && (
          <div>
            {aiTxt ? (
              <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:24}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
                  <div style={{background:C.accent,borderRadius:7,padding:"4px 12px",color:"#fff",fontWeight:700,fontSize:12}}>AI 분석 리포트</div>
                  <span style={{fontSize:12,color:C.muted}}>{selUnit.type} · {selUnit.area}㎡ · 분양전환 {conv}</span>
                </div>
                <div style={{fontSize:14,lineHeight:1.9,color:C.text,whiteSpace:"pre-wrap"}}>{aiTxt}</div>
              </div>
            ) : (
              <div style={{background:C.card,borderRadius:14,border:`1px dashed ${C.border}`,padding:40,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>🤖</div>
                <div style={{fontSize:14,color:C.muted,marginBottom:14}}>예측 결과 탭에서 AI 심층 분석을 실행하세요</div>
                <button onClick={()=>setTab("result")} style={{padding:"9px 22px",background:C.accent,border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>예측 결과 탭으로 →</button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
